<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃之家 — 產地直送水蜜桃</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        peach: { 50:'#fff5f2', 100:'#ffe8e0', 200:'#ffc9b5', 300:'#ffaa8a', 400:'#ff8a63', 500:'#f96b3f', 600:'#e04d22', 700:'#be3a16', DEFAULT:'#ffaa8a' },
                        blossom: { 50:'#fff0f5', 100:'#ffdde9', 200:'#ffbbce', 300:'#ff99b8', 400:'#f070a0', 500:'#e05090', 600:'#c03878', DEFAULT:'#ff99b8' },
                        pine: { 50:'#e8f4ee', 100:'#c0e0cc', 200:'#88c4a4', 300:'#52a87c', 400:'#2d8a5a', 500:'#1a6e42', 600:'#0f5430', 700:'#0a3d22', DEFAULT:'#1a6e42' },
                    },
                    fontFamily: {
                        serif: ['"Noto Serif TC"', 'serif'],
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #fff5f2; color: #2a1a10; scroll-behavior: smooth; }
        .hero-bg { background: linear-gradient(160deg, #fff0f5 0%, #ffe8e0 40%, #e8f4ee 100%); position: relative; overflow: hidden; }
        .section-divider { width: 60px; height: 2px; background: linear-gradient(90deg, #ff99b8, #1a6e42); margin: 0 auto 1.5rem; border-radius: 2px; }
        .price-card { border-radius: 20px; padding: 2rem 1.5rem; transition: transform 0.2s; background: white; border: 1.5px solid rgba(255,153,184,0.2); }
        .price-card.featured { background: linear-gradient(145deg, #1a6e42, #0f5430); color: white; }
        .order-btn { background: linear-gradient(135deg, #1a6e42, #2d8a5a); color: white; border-radius: 50px; padding: 1rem 2.5rem; font-family: 'Noto Serif TC', serif; transition: 0.2s; cursor: pointer; border: none; }
        .order-btn:hover { transform: scale(1.03); box-shadow: 0 8px 28px rgba(26,110,66,0.3); }
        .form-input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; background: white; }
        .faq-body { display: none; padding: 1rem; background: white; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="nav sticky top-0 z-50 border-b border-pink-100 bg-white/90 backdrop-blur-md">
  <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span style="font-size:1.5rem">🍑</span>
      <span class="font-serif font-bold text-pine-700 text-lg tracking-wider">山之源桃園</span>
    </div>
    <button class="order-btn py-2 px-6 text-sm" onclick="document.getElementById('checkout').scrollIntoView()">立即訂購</button>
  </div>
</nav>

<!-- HERO (簡略) -->
<section class="hero-bg py-20 px-6 text-center">
    <h1 class="font-serif text-4xl md:text-6xl font-bold text-pine-700 mb-4">大雪山的紅寶石</h1>
    <p class="text-gray-600 mb-8">海拔 1,200 公尺產地直送，現採現發</p>
    <button class="order-btn" onclick="document.getElementById('pricing').scrollIntoView()">查看訂購方案</button>
</section>

<!-- PRICING (核心修改區) -->
<section id="pricing" class="py-20 px-6">
  <div class="max-w-5xl mx-auto">
    <div class="text-center mb-12">
      <div class="section-divider"></div>
      <h2 class="font-serif text-3xl font-bold text-pine-700">訂購方案</h2>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
      <!-- 6顆 -->
      <div class="price-card">
        <h3 class="font-serif text-xl font-bold mb-2">嚐鮮小盒 (6顆)</h3>
        <p class="text-2xl text-pink-500 font-bold mb-4">$850 <span class="text-sm text-gray-400 line-through">$944</span></p>
        <div class="flex items-center gap-4">
            <span class="text-sm">數量：</span>
            <input type="number" id="q6" value="0" min="0" class="border rounded p-1 w-20" onchange="calculate()">
        </div>
      </div>
      <!-- 12顆 -->
      <div class="price-card featured">
        <h3 class="font-serif text-xl font-bold mb-2 text-white">典藏禮盒 (12顆)</h3>
        <p class="text-2xl text-orange-300 font-bold mb-4">$1,500 <span class="text-sm text-white/50 line-through">$1,667</span></p>
        <div class="flex items-center gap-4">
            <span class="text-sm">數量：</span>
            <input type="number" id="q12" value="0" min="0" class="border rounded p-1 w-20 text-black" onchange="calculate()">
        </div>
      </div>
      <!-- 20顆 -->
      <div class="price-card">
        <h3 class="font-serif text-xl font-bold mb-2">農場大禮箱 (20顆)</h3>
        <p class="text-2xl text-pink-500 font-bold mb-4">$2,400 <span class="text-sm text-gray-400 line-through">$2,667</span></p>
        <div class="flex items-center gap-4">
            <span class="text-sm">數量：</span>
            <input type="number" id="q20" value="0" min="0" class="border rounded p-1 w-20" onchange="calculate()">
        </div>
      </div>
    </div>

    <!-- 結帳表單 -->
    <div id="checkout" class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-pink-100">
        <h3 class="font-serif text-2xl font-bold text-pine-700 text-center mb-6">填寫訂購資料</h3>
        
        <form id="orderForm">
            <div class="mb-4">
                <p class="text-xl font-bold text-pink-600 text-center mb-4" id="totalPriceDisplay">總金額：$0</p>
                <input type="hidden" name="total_price" id="total_price_val">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-sm font-bold">收件人姓名</label>
                    <input type="text" name="name" class="form-input" required>
                </div>
                <div>
                    <label class="text-sm font-bold">聯絡電話</label>
                    <input type="tel" name="phone" class="form-input" required>
                </div>
            </div>

            <div class="mt-4">
                <label class="text-sm font-bold">收件地址</label>
                <input type="text" name="address" class="form-input" required>
            </div>

            <div class="mt-4">
                <label class="text-sm font-bold">匯款帳號末五碼</label>
                <input type="text" name="bank_id" class="form-input" placeholder="請先匯款後填寫" required>
            </div>

            <div class="mt-4 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
                <p>💰 匯款資訊：(008) 華南銀行 帳號：123-456789-012</p>
            </div>

            <button type="submit" id="submitBtn" class="order-btn w-full mt-6 bg-pink-500">確認送出訂單</button>
        </form>
    </div>
  </div>
</section>

<!-- Footer (簡略) -->
<footer class="bg-pine-700 text-white py-10 text-center">
    <p>© 2026 山之源桃園 - 產地直送水蜜桃</p>
</footer>

<script>
    // 這裡替換成你部署 Google Apps Script 後得到的 URL
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';

    function calculate() {
        const q6 = parseInt(document.getElementById('q6').value) || 0;
        const q12 = parseInt(document.getElementById('q12').value) || 0;
        const q20 = parseInt(document.getElementById('q20').value) || 0;
        
        const total = (q6 * 850) + (q12 * 1500) + (q20 * 2400);
        
        document.getElementById('totalPriceDisplay').innerText = `總金額：$${total}`;
        document.getElementById('total_price_val').value = total;
    }

    const form = document.getElementById('orderForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        
        if (document.getElementById('total_price_val').value == 0) {
            alert('請至少選擇一盒水蜜桃喔！');
            return;
        }

        btn.disabled = true;
        btn.innerText = '處理中...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('訂單已成功送出！我們會盡快與您聯繫。');
                form.reset();
                calculate();
                btn.disabled = false;
                btn.innerText = '確認送出訂單';
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('送出失敗，請檢查網路或聯絡我們。');
                btn.disabled = false;
                btn.innerText = '確認送出訂單';
            });
    });
</script>

</body>
</html>
