<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山之源桃園 — 大雪山的紅寶石水蜜桃</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        pine: { 600:'#0f5430', 700:'#0a3d22', DEFAULT:'#1a6e42' },
        blossom: { 50:'#fff0f5', 500:'#e05090', 600:'#c03878' }
      },
      fontFamily: { serif: ['"Noto Serif TC"', 'serif'], sans: ['"Noto Sans TC"', 'sans-serif'] }
    }
  }
}
</script>
<style>
  body { font-family: 'Noto Sans TC', sans-serif; color: #2a1a10; scroll-behavior: smooth; background: #fff5f2; }
  .hero-fullscreen { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: url('DSC05341.jpg') center/cover no-repeat fixed; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,245,242,0.2), rgba(255,245,242,0.9)); }
  .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 3rem; }
  .submit-btn { background: linear-gradient(135deg, #1a6e42, #2d8a5a); color: white; border-radius: 50px; padding: 1.2rem; width: 100%; font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 1.2rem; transition: all 0.3s; cursor: pointer; }
</style>
</head>
<body>

<section id="order" class="py-24 px-6">
  <div class="max-w-2xl mx-auto glass-card shadow-2xl p-8 md:p-16">
    <form id="orderForm">
      <!-- 匯款資訊區塊 -->
      <div class="bg-white/40 backdrop-blur-sm p-8 rounded-3xl border border-white mb-8">
        <p class="font-serif text-pine-700 font-bold mb-6 text-center">💰 匯款資訊</p>
        <div class="flex flex-col md:flex-row items-center gap-8">
          <div class="w-32 h-32 bg-white p-2 rounded-xl shadow-inner border border-stone-100 flex-shrink-0">
            <!-- 確保你的檔名是 bank_qr.jpg -->
            <img src="bank_qr.jpg" alt="中信匯款 QR Code" class="w-full h-full object-contain">
          </div>
          <div class="flex-grow space-y-2 text-center md:text-left">
            <p class="text-xs font-bold text-stone-400 tracking-widest">中國信託 (822)</p>
            <p class="text-base text-pine-600 font-bold">帳號：901620382731<br>分行：營業部 (0901)</p>
            <input type="text" name="bank_id" placeholder="請填寫匯款末五碼" required class="w-full mt-2 px-4 py-3 rounded-xl border-none shadow-sm outline-none text-sm">
          </div>
        </div>
      </div>
      <button type="submit" id="submitBtn" class="submit-btn">確認送出預購單</button>
    </form>
  </div>
</section>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxUel6rxdJcctE-tclrThQWE3CfBsG3Egk3coi6Uf-ZTiaYk9s0cG3P8w8GO7nMHsGF/exec';
    const form = document.getElementById('orderForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '正在傳遞山林的甜美...';
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(() => { alert('感謝預購！資料已送出。'); form.reset(); btn.disabled = false; btn.innerText = '確認送出預購單'; })
            .catch(() => { alert('發送失敗'); btn.disabled = false; });
    });
</script>
</body>
</html>
