<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山之源桃園 — 大雪山的紅寶石水蜜桃</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        forest: { 800:'#1a4731', 900:'#123323' },
        peach: { 50:'#fff9f7', 100:'#fdf2f0', 200:'#f8a59b' }
      }
    }
  }
}
</script>
<style>
  body { 
    font-family: 'Noto Sans TC', sans-serif; 
    color: #3d2b1f; 
    background: #fff9f7; 
    scroll-behavior: smooth; 
  }
  h1, h2, .font-serif { 
    font-family: 'Noto Serif TC', serif; 
    letter-spacing: 0.02em;
  }
  /* 背景容器優化 */
  .hero-fullscreen { 
    position: relative; 
    min-height: 100vh; 
    min-height: -webkit-fill-available; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    background: url('DSC05341.jpg') center center / cover no-repeat;
  }
  /* 手機版毛玻璃卡片優化 */
  .glass-card { 
    background: rgba(255, 255, 255, 0.88); 
    backdrop-filter: blur(20px); 
    -webkit-backdrop-filter: blur(20px); 
    border: 1px solid rgba(255, 255, 255, 0.5); 
    border-radius: 2rem;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  }
  /* 質感按鈕 */
  .submit-btn { 
    background: #1a4731; 
    color: #ffffff; 
    border-radius: 12px; 
    padding: 1.2rem; 
    width: 100%; 
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    transition: all 0.3s ease;
  }
  .submit-btn:active { transform: scale(0.98); }
  /* 匯款框設計 */
  .bank-box {
    background: #fdf2f0;
    border: 1px solid #f8a59b;
    border-radius: 1.5rem;
  }
  input::placeholder { color: #a8a29e; }
</style>
</head>
<body>

<div class="hero-fullscreen">
  <div class="w-full max-w-xl mx-auto px-4 py-12">
    <div class="glass-card p-8 md:p-12">
      <!-- 標題區 -->
      <div class="text-center mb-10">
        <h2 class="text-2xl md:text-3xl font-serif font-bold text-forest-800 mb-2">預購資料填寫</h2>
        <div class="w-12 h-1 bg-peach-200 mx-auto"></div>
      </div>

      <form id="orderForm" class="space-y-6">
        <!-- 匯款資訊區塊 -->
        <div class="bank-box p-6 mb-8 text-center md:text-left">
          <p class="font-serif text-forest-800 font-bold mb-4 flex items-center justify-center md:justify-start gap-2">
            <span>💰</span> 預購匯款資訊
          </p>
          <div class="flex flex-col md:flex-row items-center gap-6">
            <div class="w-32 h-32 bg-white p-2 rounded-2xl shadow-sm border border-peach-200 flex-shrink-0">
              <!-- 確保檔名為 bank_qr.jpg -->
              <img src="bank_qr.jpg" alt="中信匯款 QR Code" class="w-full h-full object-contain">
            </div>
            <div class="flex-grow space-y-1">
              <p class="text-[10px] font-bold text-stone-400 tracking-tighter uppercase">CTBC BANK (822)</p>
              <p class="text-xl text-forest-800 font-bold leading-tight">
                901620382731<br>
                <span class="text-sm font-medium text-stone-500">分行：營業部 (0901)</span>
              </p>
              <div class="pt-3">
                <input type="text" name="bank_id" placeholder="請輸入匯款帳號末 5 碼" required 
                       class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-forest-800 bg-white/50 text-sm">
              </div>
            </div>
          </div>
        </div>

        <!-- 按鈕 -->
        <button type="submit" id="submitBtn" class="submit-btn font-serif">
          確認送出預購單
        </button>
      </form>
    </div>
  </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxUel6rxdJcctE-tclrThQWE3CfBsG3Egk3coi6Uf-ZTiaYk9s0cG3P8w8GO7nMHsGF/exec';
    const form = document.getElementById('orderForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = '正在傳遞山林的甜美...';
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('感謝您的預購！我們已收到您的資料。');
                form.reset();
                btn.disabled = false;
                btn.innerText = '確認送出預購單';
            })
            .catch(error => {
                alert('發送失敗，請檢查網路連線或稍後再試。');
                btn.disabled = false;
                btn.innerText = '確認送出預購單';
            });
    });
</script>

</body>
</html>
