<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山之源桃園 | 大雪山的紅寶石水蜜桃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: '#1a6e42', accent: '#f96b3f' }, fontFamily: { serif: ['"Noto Serif TC"', 'serif'], sans: ['"Noto Sans TC"', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdfaf7; }
        .hero-section { height: 80vh; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('DSC05348.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
    </style>
</head>
<body>

<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-stone-200">
    <div class="max-w-6xl mx-auto px-5 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-xl">🍑</span>
            <span class="font-serif font-bold text-brand text-lg tracking-widest">山之源桃園</span>
        </div>
        <a href="#order" class="bg-brand text-white px-5 py-2 rounded-full text-sm font-serif">立即預購</a>
    </div>
</nav>

<header class="hero-section">
    <div>
        <h2 class="font-serif text-xl tracking-[0.3em] mb-4">海拔 1,200 公尺 · 產地直送</h2>
        <h1 class="font-serif text-5xl md:text-7xl font-bold mb-6">大雪山的紅寶石</h1>
    </div>
</header>

<section id="order" class="bg-stone-100 py-20 px-6">
    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="font-serif text-3xl font-bold text-brand">選擇訂購規格</h2>
            <p class="text-accent mt-2 font-bold underline">全館滿兩盒，每盒現折 50 元</p>
        </div>

        <form id="orderForm" class="max-w-4xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                <!-- 8粒裝 -->
                <div class="bg-white p-6 rounded-3xl shadow-lg border-2 border-transparent hover:border-brand transition text-center">
                    <img src="DSC05394.jpg" class="w-full h-60 object-cover rounded-2xl mb-6">
                    <h3 class="font-serif text-2xl font-bold mt-2">嚴選 8 粒裝</h3>
                    <p class="text-2xl font-bold text-accent mb-4">$750</p>
                    <div class="flex items-center gap-4 bg-stone-50 p-4 rounded-xl">
                        <span class="text-sm font-bold text-stone-500">訂購數量</span>
                        <!-- 關鍵點：必須有 name="qty8" -->
                        <input type="number" id="qty8" name="qty8" inputmode="numeric" pattern="[0-9]*" value="0" min="0" onchange="calculate()" class="w-full bg-transparent text-center text-xl font-bold outline-none">
                    </div>
                </div>

                <!-- 6粒裝 -->
                <div class="bg-white p-6 rounded-3xl shadow-lg border-2 border-brand relative text-center">
                    <img src="DSC05345.jpg" class="w-full h-60 object-cover rounded-2xl mb-6">
                    <h3 class="font-serif text-2xl font-bold mt-2">頂級 6 粒裝</h3>
                    <p class="text-2xl font-bold text-accent mb-4">$950</p>
                    <div class="flex items-center gap-4 bg-stone-50 p-4 rounded-xl">
                        <span class="text-sm font-bold text-stone-500">訂購數量</span>
                        <!-- 關鍵點：必須有 name="qty6" -->
                        <input type="number" id="qty6" name="qty6" inputmode="numeric" pattern="[0-9]*"  value="0" min="0" onchange="calculate()" class="w-full bg-transparent text-center text-xl font-bold outline-none">
                    </div>
                </div>
            </div>

            <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl p-8">
                <div class="text-center mb-8 border-b pb-6">
                    <p class="text-stone-500 text-sm mb-1">應付總金額</p>
                    <p class="text-4xl font-bold text-accent" id="totalDisplay">$0</p>
                    <input type="hidden" name="total_amount" id="hiddenTotal">
                </div>

                <div class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-stone-700 mb-2">收件人姓名</label>
                            <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-stone-200 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-stone-700 mb-2">電話</label>
                            <input type="tel" name="phone" inputmode="tel"required class="w-full px-4 py-3 rounded-xl border border-stone-200 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-2">收件地址</label>
                        <input type="text" name="address" required class="w-full px-4 py-3 rounded-xl border border-stone-200 outline-none">
                    </div>
                    <div class="bg-stone-50 p-5 rounded-2xl border border-dashed border-stone-300 text-sm">
                        <p class="font-bold text-brand mb-1">💰 匯款：華南銀行(008) 帳號 123-456789-012</p>
                        <label class="block font-bold text-stone-500 mb-1">匯款帳號末五碼</label>
                        <input type="text" name="bank_id" required class="w-full px-4 py-2 rounded-lg border border-stone-200 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-2">備註 (選填)</label>
                        <textarea name="note" class="w-full px-4 py-3 rounded-xl border border-stone-200 outline-none"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-brand text-white py-5 rounded-2xl font-serif text-xl font-bold hover:bg-stone-800 transition">確認預購</button>
                </div>
            </div>
        </form>
    </div>
</section>

<script>
    // 這裡請貼上你的 /exec 網址
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxUel6rxdJcctE-tclrThQWE3CfBsG3Egk3coi6Uf-ZTiaYk9s0cG3P8w8GO7nMHsGF/exec';

    function calculate() {
        const q8 = parseInt(document.getElementById('qty8').value) || 0;
        const q6 = parseInt(document.getElementById('qty6').value) || 0;
        const totalQty = q8 + q6;
        const discount = Math.floor(totalQty / 2) * 100;
        const finalAmount = (q8 * 750) + (q6 * 950) - discount;
        document.getElementById('totalDisplay').innerText = `$${finalAmount}`;
        document.getElementById('hiddenTotal').value = finalAmount;
    }

    const form = document.getElementById('orderForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        if (document.getElementById('hiddenTotal').value <= 0) return alert('請選擇訂購數量');
        
        btn.disabled = true;
        btn.innerText = '處理中...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('感謝預購！我們將儘速與您聯繫。');
                form.reset();
                calculate();
                btn.disabled = false;
                btn.innerText = '確認預購';
            })
            .catch(error => {
                alert('失敗，請檢查網址或權限設定');
                btn.disabled = false;
                btn.innerText = '確認預購';
            });
    });
</script>
</body>
</html>
