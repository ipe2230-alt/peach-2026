<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山之源桃園 — 大雪山的紅寶石</title>
    
    <!-- 引入字體：明體 (Serif) 與 黑體 (Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Noto Serif TC"', 'serif'],
                    },
                    colors: {
                        forest: { 800: '#1a4731', 900: '#123323' },
                        peach: { 50: '#fff9f7', 100: '#fdf2f0', 200: '#f8a59b' }
                    }
                }
            }
        }
    </script>
    
    <!-- 自訂樣式優化 -->
    <style>
        /* 背景處理：手機版滾動，電腦版固定，避免跳動 */
        .bg-hero {
            background-image: url('DSC05341.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: scroll; 
        }
        @media (min-width: 1024px) {
            .bg-hero { background-attachment: fixed; }
        }
        
        /* 高級毛玻璃效果 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        /* 輸入框共用樣式 */
        .input-style {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-top: 0.5rem;
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            transition: all 0.2s;
            outline: none;
        }
        .input-style:focus {
            border-color: #f8a59b;
            box-shadow: 0 0 0 3px rgba(248, 165, 155, 0.2);
            background-color: #ffffff;
        }
    </style>
</head>
<body class="bg-hero min-h-screen text-stone-800 flex items-center justify-center p-4 sm:p-8">

    <!-- 柔和的背景遮罩，讓卡片更突出 -->
    <div class="fixed inset-0 bg-white/20 z-0"></div>

    <main class="relative z-10 w-full max-w-2xl glass-panel rounded-[2rem] shadow-2xl p-7 sm:p-12 my-4">
        
        <!-- 頂部品牌區塊 -->
        <header class="text-center mb-10">
            <h2 class="text-forest-900 tracking-[0.2em] text-xs sm:text-sm font-bold mb-3">— 山之源桃園 —</h2>
            <h1 class="font-serif text-3xl sm:text-4xl text-forest-800 font-bold mb-5">大雪山的紅寶石</h1>
            <div class="w-10 h-1 bg-peach-200 mx-auto mb-6"></div>
            
            <p class="text-stone-600 text-sm sm:text-base leading-relaxed px-2 italic font-serif">
                「每一顆水蜜桃，都承載著大雪山冷冽清晨的露水，與父親守護土地的溫度。」
            </p>
            <p class="text-stone-600 text-sm sm:text-base mt-3">
                我們堅持職人栽培，將這份純淨甜美由產地直達到您的手中。
            </p>
        </header>

        <!-- 預購表單 -->
        <form id="orderForm" class="space-y-6">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 sm:gap-6">
                <div>
                    <label class="block text-sm font-bold text-stone-600 ml-1">訂購人姓名</label>
                    <input type="text" name="name" required class="input-style" placeholder="請填寫姓名">
                </div>
                <div>
                    <label class="block text-sm font-bold text-stone-600 ml-1">聯絡電話</label>
                    <input type="tel" name="phone" required class="input-style" placeholder="09xx-xxx-xxx">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-stone-600 ml-1">訂購規格</label>
                <!-- 自訂下拉選單箭頭 -->
                <select name="quantity" required class="input-style appearance-none bg-no-repeat bg-right" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231a4731%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-size: 0.65rem auto; background-position: right 1rem center;">
                    <option value="" disabled selected>請選擇預購規格</option>
                    <option value="6粒裝特選箱">【頂級】6 粒裝特選箱</option>
                    <option value="8粒裝精品箱">【優選】8 粒裝精品箱</option>
                    <option value="10粒裝風味箱">【精選】10 粒裝風味箱</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-stone-600 ml-1">收件地址</label>
                <input type="text" name="address" required class="input-style" placeholder="請輸入完整配送地址">
            </div>

            <!-- 匯款資訊區塊 -->
            <div class="bg-[#fcf5f4] border border-peach-200 rounded-2xl p-6 sm:p-8 mt-8">
                <h3 class="font-serif text-forest-800 font-bold mb-5 flex items-center gap-2">
                    <span>💰</span> 預購匯款資訊
                </h3>
                <div class="flex flex-col sm:flex-row items-center gap-6">
                    <!-- QR Code -->
                    <div class="w-28 h-28 bg-white p-2 rounded-xl shadow-sm border border-peach-200 shrink-0">
                        <img src="bank_qr.jpg" alt="匯款 QR Code" class="w-full h-full object-contain">
                    </div>
                    <!-- 帳號資訊 -->
                    <div class="text-center sm:text-left">
                        <p class="text-[11px] font-bold text-stone-400 uppercase tracking-widest mb-1">CTBC Bank (822)</p>
                        <p class="text-xl sm:text-2xl font-bold text-forest-800 mb-1 tracking-wider">9016 2038 2731</p>
                        <p class="text-sm text-stone-600">分行：營業部 (0901)</p>
                    </div>
                </div>
                
                <div class="mt-6 pt-6 border-t border-peach-200/50">
                    <label class="block text-sm font-bold text-stone-600 ml-1">匯款確認</label>
                    <input type="text" name="bank_id" required class="input-style bg-white" placeholder="請輸入您的匯款帳號末 5 碼">
                </div>
            </div>

            <!-- 送出按鈕 -->
            <button type="submit" id="submitBtn" class="w-full bg-forest-800 hover:bg-forest-900 text-white font-serif font-bold text-lg py-4 rounded-xl shadow-lg transition duration-300 transform hover:-translate-y-1 mt-4">
                確認送出預購單
            </button>
        </form>
        
        <footer class="mt-8 text-center">
            <p class="text-xs text-stone-400 tracking-wider">© 2026 山之源桃園 版權所有</p>
        </footer>
    </main>

    <!-- Google Apps Script 串接 -->
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxUel6rxdJcctE-tclrThQWE3CfBsG3Egk3coi6Uf-ZTiaYk9s0cG3P8w8GO7nMHsGF/exec';
        const form = document.getElementById('orderForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // 按鈕狀態更改為處理中
            btn.disabled = true;
            btn.innerText = '正在傳遞山林的甜美...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert('感謝您的預購！我們已收到您的資料，會盡快為您安排。');
                    form.reset();
                })
                .catch(error => {
                    alert('發送失敗，請檢查網路連線或稍後再試。');
                })
                .finally(() => {
                    // 恢復按鈕狀態
                    btn.disabled = false;
                    btn.innerText = '確認送出預購單';
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                });
        });
    </script>
</body>
</html>
